name: alarme_feriados
description: Alarme para feriados brasileiros.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.0
  path: ^1.9.1
  alarm: ^4.0.0
  permission_handler: ^11.3.0
  workmanager: ^0.5.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
